<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compact Data Tracker - Updated</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* === GLOBAL RESET & LAYOUT === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            padding: 10px 8px 50px 8px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 9px; 
        }

        /* === HEADER AREA === */
        .header-row {
            width: 100%;
            max-width: 414px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        /* === BUTTONS === */
        button {
            cursor: pointer;
            border: none;
            border-radius: 3px;
            font-weight: 600;
            font-size: 9px; 
            color: #fff;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }

        .btn-clear { background-color: #ef4444; padding: 4px 8px; }
        .btn-add-theo { background-color: #a855f7; padding: 5px 10px; }
        .btn-add-meas { background-color: #3b82f6; padding: 5px 10px; }
        .btn-delete { background-color: #ef4444; padding: 2px 5px; font-size: 8px; }
        
        .btn-save { background-color: #10b981; padding: 6px 10px; width: 100%; margin-bottom: 4px; font-size: 10px;}
        .btn-load { background-color: #f59e0b; padding: 3px 6px; }

        /* === CARDS === */
        .card {
            background-color: #1a1a1a;
            width: 100%;
            max-width: 414px;
            border-radius: 6px;
            padding: 8px; 
            margin-bottom: 12px;
        }

        .card h3 {
            margin-bottom: 6px;
            font-size: 11px; 
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        .history-title { color: #10b981; }
        .theo-title { color: #a855f7; }
        .meas-title { color: #3b82f6; }

        /* === HISTORY LIST === */
        .history-container {
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #111;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222;
            padding: 6px;
            margin: 2px;
            border-radius: 3px;
        }
        .history-item span { font-size: 10px; }
        
        .history-actions { display: flex; gap: 4px; }

        /* === CHART CONTAINER === */
        .chart-container {
            width: 100%;
            height: 260px;
            position: relative;
            margin-bottom: 8px;
            background-color: #111;
            border-radius: 4px;
        }

        /* === INPUT FIELDS === */
        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }

        .input-group input {
            flex: 1;
            background-color: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 5px; 
            font-size: 9px;
            min-width: 0;
        }

        /* === TABLES === */
        .table-container {
            width: 100%;
            max-height: 120px; 
            overflow-y: auto;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 8.5px; 
            text-align: left;
        }

        th {
            background-color: #222;
            padding: 5px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 4px 5px;
            border-bottom: 1px solid #333;
            color: #ccc;
        }

        /* === MEAN ERROR === */
        .mean-error {
            margin-top: 8px;
            padding: 5px;
            background-color: #222;
            border-radius: 3px;
            text-align: center;
            font-weight: bold;
            font-size: 10px;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px; 
            background-color: #000;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="header-row">
        <button class="btn-clear" onclick="clearAll()">Clear Active Data</button>
    </div>

    <div class="card">
        <h3 class="history-title">Saved History</h3>
        <button class="btn-save" onclick="saveHistory()">Save Current Graphs & Tables</button>
        <div class="history-container" id="historyList"></div>
    </div>

    <div class="card">
        <h3 class="theo-title">Theoretical Data (Reference)</h3>
        <div class="chart-container">
            <canvas id="theoChart"></canvas>
        </div>
        <div class="input-group">
            <input type="number" id="theoVol" placeholder="Indep. X">
            <input type="number" id="theoFreq" placeholder="Depen. Y">
            <button class="btn-add-theo" onclick="addRow('theoretical')">ADD</button>
        </div>
        <div class="table-container">
            <table id="theoTable">
                <thead>
                    <tr><th>X (Input)</th><th>Y (Expected)</th><th>Action</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3 class="meas-title">Measured Data (Actual)</h3>
        <div class="chart-container">
            <canvas id="measChart"></canvas>
        </div>
        <div class="input-group">
            <input type="number" id="measVol" placeholder="Indep. X">
            <input type="number" id="measFreq" placeholder="Depen. Y">
            <button class="btn-add-meas" onclick="addRow('measured')">ADD</button>
        </div>
        <div class="table-container">
            <table id="measTable">
                <thead>
                    <tr><th>X (Input)</th><th>Y (Actual)</th><th>% Err (Y)</th><th>Action</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="mean-error" id="meanErrorDisplay">Mean % Error: 0.00%</div>
    </div>

    <div class="bottom-bar"></div>

    <script>
        let theoData = [];
        let measData = [];
        let savedHistory = [];
        let chartTheoInstance = null;
        let chartMeasInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            try {
                const stored = localStorage.getItem('trackerHistory');
                if (stored) {
                    savedHistory = JSON.parse(stored);
                }
            } catch (e) {
                console.error("Failed to parse history data", e);
                savedHistory = [];
            }
            
            initCharts();
            updateUI();
            renderHistory();
        });

        // --- Data Entry Logic ---
        function addRow(type) {
            if (type === 'theoretical') {
                const xVal = document.getElementById('theoVol').value;
                const yVal = document.getElementById('theoFreq').value;
                if (!xVal || !yVal) return;
                theoData.push({ x: parseFloat(xVal), y: parseFloat(yVal) });
                theoData.sort((a, b) => a.x - b.x); // Keep X-axis organized
                document.getElementById('theoVol').value = '';
                document.getElementById('theoFreq').value = '';
            } else {
                const xVal = document.getElementById('measVol').value;
                const yVal = document.getElementById('measFreq').value;
                if (!xVal || !yVal) return;
                measData.push({ x: parseFloat(xVal), y: parseFloat(yVal) });
                measData.sort((a, b) => a.x - b.x); // Keep X-axis organized
                document.getElementById('measVol').value = '';
                document.getElementById('measFreq').value = '';
            }
            updateUI();
        }

        function deleteRow(type, index) {
            if (type === 'theoretical') {
                theoData.splice(index, 1);
            } else {
                measData.splice(index, 1);
            }
            updateUI();
        }

        function clearAll() {
            if (confirm("Clear active tables and graphs?")) {
                theoData = [];
                measData = [];
                updateUI();
            }
        }

        // --- UI & Tables ---
        function renderTables() {
            const theoTbody = document.querySelector('#theoTable tbody');
            const measTbody = document.querySelector('#measTable tbody');
            theoTbody.innerHTML = '';
            measTbody.innerHTML = '';

            theoData.forEach((row, i) => {
                theoTbody.innerHTML += `<tr><td>${row.x}</td><td>${row.y}</td><td><button class="btn-delete" onclick="deleteRow('theoretical', ${i})">Del</button></td></tr>`;
            });

            let totalError = 0, count = 0;
            measData.forEach((row, i) => {
                let errStr = "N/A";
                
                // ERROR LOGIC: Find the theoretical point with the SAME X value
                const match = theoData.find(t => t.x === row.x);
                
                if (match && match.y !== 0) {
                    // Compare Y values (Dependent variables)
                    let errorVal = ((row.y - match.y) / match.y) * 100;
                    errStr = errorVal.toFixed(2) + "%";
                    totalError += Math.abs(errorVal);
                    count++;
                }

                measTbody.innerHTML += `<tr><td>${row.x}</td><td>${row.y}</td><td>${errStr}</td><td><button class="btn-delete" onclick="deleteRow('measured', ${i})">Del</button></td></tr>`;
            });

            const meanDisp = document.getElementById('meanErrorDisplay');
            if (count > 0) {
                meanDisp.innerText = `Mean % Error: ${(totalError/count).toFixed(2)}%`;
                meanDisp.style.color = "#fff";
            } else {
                meanDisp.innerText = "Mean % Error: N/A (Enter matching X in Theo)";
                meanDisp.style.color = "#666";
            }
        }

        // --- Chart Logic ---
        function initCharts() {
            const cfg = (label, color) => ({
                type: 'scatter',
                data: { datasets: [{ label: label, data: [], borderColor: color, showLine: true, borderWidth: 1.5, pointRadius: 3 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'linear', position: 'bottom', grid: { color: '#222' }, ticks: { color: '#888', font: { size: 9 } } },
                        y: { type: 'linear', grid: { color: '#222' }, ticks: { color: '#888', font: { size: 9 } } }
                    },
                    plugins: { legend: { labels: { color: '#fff', font: { size: 10 }, boxWidth: 10 } } }
                }
            });

            chartTheoInstance = new Chart(document.getElementById('theoChart').getContext('2d'), cfg('Theoretical Y (Expected)', '#a855f7'));
            chartMeasInstance = new Chart(document.getElementById('measChart').getContext('2d'), cfg('Measured Y (Actual)', '#3b82f6'));
        }

        function updateCharts() {
            if (chartTheoInstance && chartMeasInstance) {
                chartTheoInstance.data.datasets[0].data = theoData;
                chartMeasInstance.data.datasets[0].data = measData;
                chartTheoInstance.update();
                chartMeasInstance.update();
            }
        }

        function updateUI() {
            renderTables();
            updateCharts();
        }

        // --- History Logic ---
        function saveHistory() {
            if (theoData.length === 0 && measData.length === 0) return;
            const snapshot = {
                date: new Date().toLocaleString(),
                theoData: JSON.parse(JSON.stringify(theoData)),
                measData: JSON.parse(JSON.stringify(measData))
            };
            savedHistory.unshift(snapshot);
            localStorage.setItem('trackerHistory', JSON.stringify(savedHistory));
            renderHistory();
        }

        function loadHistory(index) {
            if (confirm("Load this save?")) {
                theoData = JSON.parse(JSON.stringify(savedHistory[index].theoData));
                measData = JSON.parse(JSON.stringify(savedHistory[index].measData));
                updateUI();
            }
        }

        function deleteHistory(index) {
            if (confirm("Delete save?")) {
                savedHistory.splice(index, 1);
                localStorage.setItem('trackerHistory', JSON.stringify(savedHistory));
                renderHistory();
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = savedHistory.length ? '' : '<div style="color: #666; text-align: center; padding: 10px;">No saved sessions</div>';
            savedHistory.forEach((item, index) => {
                list.innerHTML += `
                    <div class="history-item">
                        <span>${item.date}</span>
                        <div class="history-actions">
                            <button class="btn-load" onclick="loadHistory(${index})">Load</button>
                            <button class="btn-delete" onclick="deleteHistory(${index})">Del</button>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
